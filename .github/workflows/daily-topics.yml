name: Daily Topic Update

on:
  schedule:
    # 매일 15:10 UTC = 다음날 00:10 KST
    - cron: "10 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-topics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update daily topics
        run: python scripts/update_daily_topics.py

      - name: Commit changes
        run: |
          if git diff --quiet data/daily-topics.json; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily-topics.json
          git commit -m "chore: daily trending topics update"
          git push
